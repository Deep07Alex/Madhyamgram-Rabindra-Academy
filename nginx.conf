server {
    listen 80;
    server_name yourdomain.com; # Replace with your domain or IP

    # Redirect HTTP to HTTPS (uncomment when SSL is ready)
    # return 301 https://$host$request_uri;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Frontend Static Files
    location / {
        root /var/www/madhyamgram-rabindra-academy/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # API and SSE Reverse Proxy
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # Specific for SSE
        proxy_set_header Connection "";
        proxy_set_header Content-Type "text/event-stream";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Static Uploads handled by Nginx directly (Faster than Node)
    location /uploads {
        alias /var/www/madhyamgram-rabindra-academy/server/uploads;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
